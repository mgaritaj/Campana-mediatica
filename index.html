<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campaign Performance Survey</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f3f0f7; min-height: 100vh; padding: 2rem 1rem; }
    .form-wrapper { max-width: 680px; margin: 0 auto; }
    .form-header { background: #340763; border-radius: 12px 12px 0 0; padding: 2rem 1.5rem 1.5rem; border-bottom: 6px solid #f8c304; }
    .form-header h1 { color: #f8c304; font-size: 22px; font-weight: 500; margin-bottom: 6px; }
    .form-header p { color: #e0c8f5; font-size: 14px; }
    .form-body { background: #ffffff; border: 0.5px solid #ddd; border-top: none; border-radius: 0 0 12px 12px; padding: 1.5rem; }
    .section-title { font-size: 13px; font-weight: 500; color: #6c117b; text-transform: uppercase; letter-spacing: 0.05em; margin: 1.5rem 0 0.75rem; padding-bottom: 4px; border-bottom: 2px solid #f8c304; }
    .section-title:first-child { margin-top: 0; }
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 13px; color: #555; font-weight: 500; }
    .field input, .field select { border: 0.5px solid #bbb; border-radius: 8px; padding: 8px 12px; font-size: 14px; color: #222; background: #fff; outline: none; transition: border-color 0.15s; width: 100%; }
    .field input:focus, .field select:focus { border-color: #6c117b; box-shadow: 0 0 0 2px rgba(108,17,123,0.15); }
    .required { color: #ff329d; margin-left: 2px; }
    .submit-btn { width: 100%; margin-top: 1.5rem; padding: 12px; background: #6c117b; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .submit-btn:hover { background: #340763; }
    .submit-btn:active { transform: scale(0.98); }
    .success-msg { display: none; background: #f0fff4; border: 1px solid #9ae6b4; border-radius: 8px; padding: 1rem; text-align: center; color: #276749; font-size: 14px; margin-top: 1rem; }
    .accent-bar { height: 4px; background: linear-gradient(90deg, #f8c304, #ff329d, #6c117b, #0182b0); border-radius: 0 0 12px 12px; }
    @media (max-width: 500px) { .field-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="form-wrapper">
  <div class="form-header">
    <h1>Campaign Performance Survey</h1>
    <p>Complete all fields to submit your campaign data</p>
  </div>
  <div class="form-body">

    <div class="section-title">Información general</div>
    <div class="field-grid">
      <div class="field">
        <label>Nombre compañía <span class="required">*</span></label>
        <input type="text" id="f_261817188" placeholder="e.g. Innovate Industries" />
      </div>
      <div class="field">
        <label>Ubicación <span class="required">*</span></label>
        <input type="text" id="f_46748773" placeholder="e.g. Chicago" />
      </div>
      <div class="field">
        <label>Idioma <span class="required">*</span></label>
        <input type="text" id="f_2044462795" placeholder="e.g. Spanish" />
      </div>
      <div class="field">
        <label>Fecha <span class="required">*</span></label>
        <input type="date" id="f_617893855" />
      </div>
    </div>

    <div class="section-title">Detalles de campaña</div>
    <div class="field-grid">
      <div class="field">
        <label>Tipo de campaña <span class="required">*</span></label>
        <select id="f_1352443048">
          <option value="">Seleccionar...</option>
          <option value="Display">Display</option>
          <option value="Email">Email</option>
          <option value="Influencer">Influencer</option>
          <option value="Search">Search</option>
          <option value="Social Media">Social Media</option>
        </select>
      </div>
      <div class="field">
        <label>Canal usado <span class="required">*</span></label>
        <select id="f_992916647">
          <option value="">Seleccionar...</option>
          <option value="Email">Email</option>
          <option value="Facebook">Facebook</option>
          <option value="Google Ads">Google Ads</option>
          <option value="Instagram">Instagram</option>
          <option value="Website">Website</option>
          <option value="YouTube">YouTube</option>
        </select>
      </div>
      <div class="field">
        <label>Duración <span class="required">*</span></label>
        <select id="f_311659224">
          <option value="">Seleccionar...</option>
          <option value="15 days">15 days</option>
          <option value="30 days">30 days</option>
          <option value="45 days">45 days</option>
          <option value="60 days">60 days</option>
        </select>
      </div>
    </div>

    <div class="section-title">Audiencia</div>
    <div class="field-grid">
      <div class="field">
        <label>Público meta <span class="required">*</span></label>
        <select id="f_1273936373">
          <option value="">Seleccionar...</option>
          <option value="All Ages">All Ages</option>
          <option value="Men 18-24">Men 18-24</option>
          <option value="Men 25-34">Men 25-34</option>
          <option value="Women 25-34">Women 25-34</option>
          <option value="Women 35-44">Women 35-44</option>
        </select>
      </div>
      <div class="field">
        <label>Segmento clientes <span class="required">*</span></label>
        <select id="f_1741976105">
          <option value="">Seleccionar...</option>
          <option value="Fashionistas">Fashionistas</option>
          <option value="Foodies">Foodies</option>
          <option value="Health & Wellness">Health &amp; Wellness</option>
          <option value="Outdoor Adventurers">Outdoor Adventurers</option>
          <option value="Tech Enthusiasts">Tech Enthusiasts</option>
        </select>
      </div>
    </div>

    <div class="section-title">Métricas</div>
    <div class="field-grid">
      <div class="field">
        <label>Impresiones <span class="required">*</span></label>
        <input type="number" id="f_1654755469" placeholder="e.g. 16174" />
      </div>
      <div class="field">
        <label>Clics <span class="required">*</span></label>
        <input type="number" id="f_139453002" placeholder="e.g. 506" />
      </div>
      <div class="field">
        <label>Tasa conversión <span class="required">*</span></label>
        <input type="number" step="0.01" id="f_753426159" placeholder="e.g. 0.04" />
      </div>
      <div class="field">
        <label>Costo de adquisición <span class="required">*</span></label>
        <input type="number" step="0.01" id="f_388538169" placeholder="e.g. 6.29" />
      </div>
      <div class="field">
        <label>ROI <span class="required">*</span></label>
        <input type="number" step="0.1" id="f_1180566075" placeholder="e.g. 6" />
      </div>
      <div class="field">
        <label>Nota enganche <span class="required">*</span></label>
        <input type="number" id="f_911336389" placeholder="e.g. 1922" />
      </div>
    </div>

    <button class="submit-btn" onclick="submitForm()">Enviar datos</button>
    <div class="success-msg" id="successMsg">Tu respuesta fue enviada exitosamente.</div>
  </div>
  <div class="accent-bar"></div>
</div>

<script>
function submitForm() {
  const base = "https://docs.google.com/forms/d/e/1FAIpQLSduzU1bW3N9-0mGdlnbM9Epr2QS5rVl0zglZWFgfTGGqjABNQ/formResponse";
  const fields = [
    "261817188","992916647","1273936373","311659224","1352443048",
    "753426159","1654755469","388538169","46748773","2044462795",
    "139453002","911336389","1180566075","1741976105","617893855"
  ];
  const params = fields.map(id => {
    const val = document.getElementById("f_" + id)?.value || "";
    return "entry." + id + "=" + encodeURIComponent(val);
  }).join("&");

  const url = base + "?" + params + "&submit=Submit";

  fetch(url, { method: "POST", mode: "no-cors" })
    .then(() => {
      document.getElementById("successMsg").style.display = "block";
      document.querySelector(".submit-btn").disabled = true;
      document.querySelector(".submit-btn").style.background = "#888";
    })
    .catch(() => {
      document.getElementById("successMsg").style.display = "block";
    });
}
</script>

</body>
</html>
